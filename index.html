<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearts & Roses 🌹💖</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
  text-align: center;
}

/* Header */
#counter {
  position: fixed;
  top: 10px;
  width: 100%;
  font-size: 14px;
  z-index: 10;
}

#message {
  position: fixed;
  top: 35px;
  width: 100%;
  font-size: 14px;
  color: yellowgreen;
  z-index: 10;
}

/* Emojis */
.emoji {
  position: absolute;
  font-size: 22px;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10vh); }
  to { transform: translateY(110vh); }
}

/* 🎵 EXPLORE BUTTON */
#exploreBtn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: hotpink;
  color: white;
}

/* 📦 SONG BOX */
#songBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-height: 50%;
  background: #111;
  overflow-y: auto;
  display: none;
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
}

.songItem {
  padding: 10px;
  border-bottom: 1px solid #333;
  font-size: 14px;
}

/* 🎧 MINI PLAYER */
#miniPlayer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #222;
  padding: 6px;
  font-size: 12px;
  display: none;
}

#seek {
  width: 90%;
}
</style>
</head>

<body>

<div id="counter">Hearts: 0 🌹: 0</div>
<div id="message"></div>

<button id="exploreBtn" onclick="toggleSongs()">🎵 Explore Songs</button>

<div id="songBox"></div>

<div id="miniPlayer">
  <div id="songName">Song</div>
  <div id="controls">
    <button onclick="togglePlay()">▶️</button>
    <span id="time">0:00 / 0:00</span>
  </div>
  <input type="range" id="seek">
</div>

<audio id="player"></audio>

<script>
let songs = [
"Love Me Thoda Aur Yaariyan 320 Kbps.mp3",
"Waalian Harnoor 320 Kbps.mp3",
"Tu Hi Haqeeqat Tum Mile Original Motion Picturetrack 320 Kbps.mp3",
"Thinking Of You Ap Dhillon 320 Kbps.mp3",
"Tera Hone Laga Hoon Ajab Prem Ki Ghazab Kahani 320 Kbps.mp3",
"Soniyo Raaz The Mystery Continuous 320 Kbps.mp3",
"Mere Rang Mein Rangne Wali Maine Pyar Kiya 320 Kbps.mp3",
"Main Rang Sharbaton Ka Phata Poster Nikhla Hero 320 Kbps.mp3",
"Ishq Bulaava Hasee Toh Phasee 320 Kbps.mp3",
"Girl I Need You Baaghi 320 Kbps.mp3",
"Dhokha Dhadi R... Rajkumar 320 Kbps.mp3"
];

let songBox = document.getElementById("songBox");
let player = document.getElementById("player");
let mini = document.getElementById("miniPlayer");
let songName = document.getElementById("songName");
let time = document.getElementById("time");
let seek = document.getElementById("seek");

/* 🎵 LOAD SONG LIST */
songs.forEach(file => {
  let div = document.createElement("div");
  div.className = "songItem";
  div.innerText = file.replace(".mp3","");
  div.onclick = () => selectSong(file);
  songBox.appendChild(div);
});

/* 📦 TOGGLE SONG BOX */
function toggleSongs() {
  songBox.style.display =
    songBox.style.display === "block" ? "none" : "block";
}

/* 🎯 SELECT SONG */
function selectSong(file) {
  player.src = file;
  player.play();

  songName.innerText = file.replace(".mp3","");
  mini.style.display = "block";
  songBox.style.display = "none";
}

/* ▶️ PLAY/PAUSE */
function togglePlay() {
  if (player.paused) player.play();
  else player.pause();
}

/* ⏱ TIME */
function format(sec) {
  sec = Math.floor(sec || 0);
  let m = Math.floor(sec/60);
  let s = sec%60;
  return m + ":" + (s<10?"0"+s:s);
}

player.ontimeupdate = () => {
  time.innerText =
    format(player.currentTime) + " / " + format(player.duration);
  seek.value = (player.currentTime / player.duration) * 100 || 0;
};

seek.oninput = () => {
  if (player.duration) {
    player.currentTime = (seek.value/100) * player.duration;
  }
};

/* ❤️ EMOJIS */
let hearts = 0, roses = 0;
let emojis = ["❤️","💖","💘","💝","💗","💓","💞","💕","🌹"];

function createEmoji() {
  let e = document.createElement("div");
  e.className = "emoji";
  let rand = emojis[Math.floor(Math.random()*emojis.length)];
  e.innerText = rand;

  e.style.left = Math.random()*100+"vw";
  e.style.animationDuration = (3+Math.random()*3)+"s";

  document.body.appendChild(e);

  if (rand === "🌹") roses++; else hearts++;

  document.getElementById("counter").innerText =
    "Hearts: "+hearts+" 🌹: "+roses;

  setTimeout(()=>e.remove(),6000);
}

setInterval(createEmoji,120);
</script>

</body>
</html>
