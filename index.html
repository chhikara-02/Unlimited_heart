<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearts & Roses 🌹💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Counter */
#counter {
  position: fixed;
  top: 10px;
  width: 100%;
  font-size: 20px;
  font-weight: bold;
  z-index: 10;
}

/* Message Box */
#message {
  position: fixed;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  max-width: 300px;
  padding: 12px;
  font-size: 20px;
  color: rgb(167, 204, 35);
  background: rgba(0, 0, 0, 0.651);
  border-radius: 12px;
  z-index: 10;
}

/* Falling emojis */
.emoji {
  position: absolute;
  font-size: 24px;
  animation: fall linear infinite;
  z-index: 1;
}

@keyframes fall {
  from { transform: translateY(-10vh); }
  to { transform: translateY(110vh); }
}

/* Music buttons */
#music {
  position: fixed;
  bottom: 10px;
  width: 100%;
  z-index: 10;
}

button {
  margin: 3px;
  padding: 8px;
  font-size: 12px;
  border-radius: 10px;
  border: none;
  background: pink;
}
</style>
</head>

<body>

<div id="counter">Hearts: 0 🌹: 0</div>
<div id="message"></div>

<audio id="player" loop></audio>

<div id="music">
  <div>🎵 Select Song:</div>
  
  <!-- Replace filenames with your actual songs -->
  <button onclick="playSong('Love Me Thoda Aur Yaariyan 320 Kbps.mp3')">Love Me Thoda Aur</button>
  <button onclick="playSong('Waalian Harnoor 320 Kbps.mp3')">Waalian</button>
  <button onclick="playSong('Tu Hi Haqeeqat Tum Mile Original Motion Picturetrack 320 Kbps.mp3')">Tu Hi Haqeeqat</button>
  <button onclick="playSong('Thinking Of You Ap Dhillon 320 Kbps.mp3')">Thinking Of You</button>
  <button onclick="playSong('Tera Hone Laga Hoon Ajab Prem Ki Ghazab Kahani 320 Kbps.mp3')">Tera Hone Laga Hu</button>
  <button onclick="playSong('Soniyo Raaz The Mystery Continuous 320 Kbps.mp3')">Soniyo</button>
  <button onclick="playSong('Mere Rang Mein Rangne Wali Maine Pyar Kiya 320 Kbps.mp3')">Mere Rang Mein Rangne Wali</button>
  <button onclick="playSong('Main Rang Sharbaton Ka Phata Poster Nikhla Hero 320 Kbps.mp3')">Main Rang Sharbaton Ka</button>
  <button onclick="playSong('Ishq Bulaava Hasee Toh Phasee 320 Kbps.mp3')">Ishq Bulaava</button>
  <button onclick="playSong('Girl I Need You Baaghi 320 Kbps.mp3')">Girl I Need You</button>

</div>

<script>
let heartCount = 0;
let roseCount = 0;

const emojis = ["❤️","💖","💘","💝","💗","💓","💞","💕","🌹","🥀","🌷"];

function createEmoji() {
  const emoji = document.createElement("div");
  emoji.classList.add("emoji");

  const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
  emoji.innerText = randomEmoji;

  emoji.style.left = Math.random() * 100 + "vw";
  emoji.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(emoji);

  // Count hearts & roses
  if (["❤️","💖","💘","💝","💗","💓","💞","💕"].includes(randomEmoji)) {
    heartCount++;
  } else {
    roseCount++;
  }

  updateCounter();

  setTimeout(() => {
    emoji.remove();
  }, 5000);
}

function updateCounter() {
  document.getElementById("counter").innerText =
    "Hearts: " + heartCount + " 🌹: " + roseCount;

  const msg = document.getElementById("message");

  if (heartCount >= 100 && heartCount < 200) {
    msg.innerText = "Help karne ke liye counter on kr diya hai mene";
  } 
  else if (heartCount >= 200 && heartCount < 300) {
    msg.innerText = "Ye nhi rukne waale ye chalte rhege";
  } 
  else if (heartCount >= 300) {
    msg.innerText = "Tere phone ki battery dead hojaegi but heart nhi rukege";
  }
}

// Faster emoji rain 😄
setInterval(createEmoji, 35);

// Music player (fixed)
function playSong(file) {
  const player = document.getElementById("player");
  player.src = file;
  player.play();
}
</script>

</body>
</html>
