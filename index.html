<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearts & Roses 🌹💖</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow-x: hidden;
}

/* Header */
#counter {
  position: fixed;
  top: 10px;
  width: 100%;
  font-size: 16px;
  z-index: 10;
}

#message {
  position: fixed;
  top: 40px;
  width: 100%;
  color: yellowgreen;
  z-index: 10;
}

/* Emojis */
.emoji {
  position: absolute;
  font-size: 22px;
  animation: fall linear infinite;
}
@keyframes fall {
  from { transform: translateY(-10vh); }
  to { transform: translateY(110vh); }
}

/* Explore Button */
#exploreBtn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: hotpink;
  color: white;
  z-index: 20;
}

/* Popup */
#songBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-height: 60%;
  background: #111;
  display: none;
  overflow-y: auto;
  z-index: 20;
  border-radius: 15px 15px 0 0;
}

.songItem {
  padding: 12px;
  border-bottom: 1px solid #333;
}

/* Hidden original buttons */
#music {
  display: none;
}
</style>
</head>

<body>

<div id="counter">Hearts: 0 🌹: 0</div>
<div id="message"></div>

<button id="exploreBtn" onclick="toggleSongs()">🎵 Explore Songs</button>

<div id="songBox"></div>

<audio id="player"></audio>

<!-- ORIGINAL SONG BUTTONS (hidden but used for logic) -->
<div id="music">

<button onclick="playSong('Love Me Thoda Aur Yaariyan 320 Kbps.mp3', this)">
<span class="title">Love Me Thoda Aur</span>
<div class="controls"><span class="time"></span><input type="range" class="seek"></div>
</button>

<button onclick="playSong('Waalian Harnoor 320 Kbps.mp3', this)">
<span class="title">Waalian</span></button>

<button onclick="playSong('Tu Hi Haqeeqat Tum Mile Original Motion Picturetrack 320 Kbps.mp3', this)">
<span class="title">Tu Hi Haqeeqat</span></button>

<button onclick="playSong('Thinking Of You Ap Dhillon 320 Kbps.mp3', this)">
<span class="title">Thinking Of You</span></button>

<button onclick="playSong('Tera Hone Laga Hoon Ajab Prem Ki Ghazab Kahani 320 Kbps.mp3', this)">
<span class="title">Tera Hone Laga Hu</span></button>

<button onclick="playSong('Soniyo Raaz The Mystery Continuous 320 Kbps.mp3', this)">
<span class="title">Soniyo</span></button>

<button onclick="playSong('Mere Rang Mein Rangne Wali Maine Pyar Kiya 320 Kbps.mp3', this)">
<span class="title">Mere Rang Mein</span></button>

<button onclick="playSong('Main Rang Sharbaton Ka Phata Poster Nikhla Hero 320 Kbps.mp3', this)">
<span class="title">Main Rang Sharbaton Ka</span></button>

<button onclick="playSong('Ishq Bulaava Hasee Toh Phasee 320 Kbps.mp3', this)">
<span class="title">Ishq Bulaava</span></button>

<button onclick="playSong('Girl I Need You Baaghi 320 Kbps.mp3', this)">
<span class="title">Girl I Need You</span></button>

<button onclick="playSong('Dhokha Dhadi R... Rajkumar 320 Kbps.mp3', this)">
<span class="title">Dhokha Dhadi</span></button>

</div>

<script>
let player = document.getElementById("player");

/* SONG LIST */
const songs = [
{name:"Love Me Thoda Aur", file:"Love Me Thoda Aur Yaariyan 320 Kbps.mp3"},
{name:"Waalian", file:"Waalian Harnoor 320 Kbps.mp3"},
{name:"Tu Hi Haqeeqat", file:"Tu Hi Haqeeqat Tum Mile Original Motion Picturetrack 320 Kbps.mp3"},
{name:"Thinking Of You", file:"Thinking Of You Ap Dhillon 320 Kbps.mp3"},
{name:"Tera Hone Laga Hu", file:"Tera Hone Laga Hoon Ajab Prem Ki Ghazab Kahani 320 Kbps.mp3"},
{name:"Soniyo", file:"Soniyo Raaz The Mystery Continuous 320 Kbps.mp3"},
{name:"Mere Rang Mein", file:"Mere Rang Mein Rangne Wali Maine Pyar Kiya 320 Kbps.mp3"},
{name:"Main Rang Sharbaton Ka", file:"Main Rang Sharbaton Ka Phata Poster Nikhla Hero 320 Kbps.mp3"},
{name:"Ishq Bulaava", file:"Ishq Bulaava Hasee Toh Phasee 320 Kbps.mp3"},
{name:"Girl I Need You", file:"Girl I Need You Baaghi 320 Kbps.mp3"},
{name:"Dhokha Dhadi", file:"Dhokha Dhadi R... Rajkumar 320 Kbps.mp3"}
];

let songBox = document.getElementById("songBox");

/* CREATE POPUP LIST */
songs.forEach(song => {
  let div = document.createElement("div");
  div.className = "songItem";
  div.innerText = song.name;

  div.onclick = () => {
    player.src = song.file;
    player.play();
    songBox.style.display = "none";
  };

  songBox.appendChild(div);
});

/* TOGGLE POPUP */
function toggleSongs() {
  songBox.style.display =
    songBox.style.display === "block" ? "none" : "block";
}

/* EMOJIS */
let hearts = 0, roses = 0;
let emojis = ["❤️","💖","💘","💝","💗","💓","💞","💕","🌹","🥀","🌷"];

function createEmoji() {
  let e = document.createElement("div");
  e.className = "emoji";

  let rand = emojis[Math.floor(Math.random()*emojis.length)];
  e.innerText = rand;

  e.style.left = Math.random()*100+"vw";
  e.style.animationDuration = (3+Math.random()*3)+"s";

  document.body.appendChild(e);

  if (rand === "🌹") roses++; else hearts++;

  document.getElementById("counter").innerText =
    "Hearts: "+hearts+" 🌹: "+roses;

  setTimeout(()=>e.remove(),6000);
}

setInterval(createEmoji,120);
</script>

</body>
</html>
